<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free sky images</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400;1,600&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="biloxibranch.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sky" id="sky">
        <img id="back">
        <img id="front">
    </div>
    <div class="menu" id="menu">
        <div class="menu-header">
            <img class="logo" src="biloxibranch.svg" alt="">
            <span>
                Free sky images
            </span>
        </div>
        <p>by Biloxi chess club</p>
        <div class="menu-close" id="menuClose">×</div>
        <div class="grid" id="grid"></div>
        <div id="loadMore">+</div>
    </div>
    <div class="modal" id="modal">
        <img id="modalImg">
        <div class="close controls" id="close">×</div>
        <div class="arrow left controls" id="prev">‹</div>
        <div class="arrow right controls" id="next">›</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
